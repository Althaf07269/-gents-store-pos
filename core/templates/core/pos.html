{% extends 'core/base.html' %}{% block content %}<h1>Billing POS</h1><div class='pos'><section><input id='searchBox' placeholder='Scan barcode or search product'><button onclick='lookupProduct()'>Add/Search</button><div id='results'></div><h3>Customer</h3><input id='customerName' placeholder='Customer name'><input id='customerPhone' placeholder='WhatsApp mobile e.g. 9876543210' type='tel'></section><section><h2>Cart</h2><table id='cartTable'><tr><th>Product</th><th>Qty</th><th>Price</th><th>Total</th><th></th></tr></table><p>Discount <input id='discount' type='number' value='0' oninput='renderCart()'></p><p>Payment <select id='payment'><option>cash</option><option>upi</option><option>card</option><option>mixed</option></select></p><h2 id='grand'>₹0</h2><button class='primary' onclick='saveSale()'>Save & Print Bill</button></section></div>{% csrf_token %}{% endblock %}
